<section class="panel mic-panel dashboard-widget"
         data-layout-widget="mic" data-layout-size="normal" data-layout-order="1">
  <div class="mic-offline-overlay" id="mic-offline-overlay" style="display:none">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28Zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99ZM4.27 3 3 4.27l6.01 6.01V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52C9.24 16.1 7 13.86 7 11H5a7 7 0 0 0 6 6.92V21h2v-3.08c.57-.08 1.12-.23 1.64-.45L19.73 21 21 19.73 4.27 3Z"/></svg>
    </div>
    <div class="offline-label" data-i18n="mic_server_required">Requires local server</div>
    <button class="offline-action-btn" type="button" onclick="openAudioSettings()"
            data-i18n="open_audio_settings">Open Audio Settings</button>
  </div>

  <div class="mic-head">
    <div class="status-label active" id="status-label" data-i18n="mic_active">Microphone active</div>
    <div class="mic-context" id="mic-context" data-i18n="mic_input_live">Live input</div>
  </div>

  <div class="btn-wrap">
    <div class="ring active" id="ring"></div>
    <div class="ring2 active" id="ring2"></div>
    <div class="glow active" id="glow"></div>
    <button class="mic-btn active" id="mic-btn" type="button" onclick="handleMicTap()"
            data-i18n-title="mic_mute_tip">
      <svg id="svg-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Zm-1-9a1 1 0 0 1 2 0v6a1 1 0 0 1-2 0V5Zm6 6a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"/></svg>
      <svg id="svg-off" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28Zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99ZM4.27 3 3 4.27l6.01 6.01V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52C9.24 16.1 7 13.86 7 11H5a7 7 0 0 0 6 6.92V21h2v-3.08c.57-.08 1.12-.23 1.64-.45L19.73 21 21 19.73 4.27 3Z"/></svg>
    </button>
  </div>

  <div class="mic-vol">
    <span class="mic-vol-value" id="mic-vol-val">--%</span>
    <div class="mic-vol-track">
      <input class="mic-vol-slider" id="mic-vol-slider" type="range" min="0" max="100" value="50"
             oninput="onMicVolumeInput(this.value)">
    </div>
    <span class="mic-vol-label" data-i18n="mic_sensitivity">SENS.</span>
  </div>
</section>
