<section class="panel notes-panel dashboard-widget"
         data-layout-widget="notes" data-layout-size="normal" data-layout-order="3">
  <div class="notes-head">
    <div class="notes-title-row">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.83a2 2 0 0 0-.59-1.42l-3.83-3.83A2 2 0 0 0 15.17 3H5Zm2 4h6v2H7V7Zm0 4h10v2H7v-2Zm0 4h10v2H7v-2Z"/></svg>
      <span data-i18n="notes_title">Notes</span>
    </div>
    <div class="notes-status" id="notes-status">
      <span class="notes-status-dot" id="notes-status-dot"></span>
    </div>
  </div>
  <textarea class="notes-area" id="notes-area" spellcheck="false"
            data-i18n-placeholder="notes_placeholder"
            placeholder="Type your notes here — saved automatically…"
            oninput="onNotesInput(this.value)"></textarea>
</section>
