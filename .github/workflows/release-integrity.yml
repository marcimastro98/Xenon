name: Release integrity

# MANUAL RECOVERY TOOL. Normal releases sign SHA256SUMS inside release.yml (the
# atomic pipeline triggered by pushing the version tag), so every asset —
# source.zip, xenon-helper.exe, Xenon-Setup-x64.exe — is hashed, signed and
# staged on the draft BEFORE the release is published. The old
# `release: published` trigger here signed after the fact and had to poll for
# the helper build, leaving a window where self-update hit integrity_missing.
#
# Run this manually to (re)sign an EXISTING release, e.g. if GitHub ever
# re-compresses old source archives (the hash would stop matching) or after
# manually re-attaching an asset. It hashes the source zip plus whichever of
# xenon-helper.exe / Xenon-Setup-x64.exe are attached to the release.
#
# Consumers verifying against this signed manifest with the pinned key:
#   - server/self-update.js       (source.zip line, before applying an update)
#   - server/helper-update.js     (xenon-helper.exe line, boot self-heal)
#   - the setup.exe bootstrap     (source.zip line, first install)
# All fail closed.
#
# The signing PRIVATE key lives only in the repo secret XENON_UPDATE_SIGNING_KEY
# (PKCS#8 PEM); the matching public key is pinned in server/self-update.js
# (UPDATE_PUBKEY_PEM) and in apps/native/src-tauri/windows/xenon-bootstrap.ps1.
# If the secret is missing this job FAILS LOUDLY on purpose.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)sign, e.g. v4.5.1'
        required: true

permissions:
  contents: write

concurrency:
  group: release-integrity-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  sign:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download the tag source zip (same URL the updater uses)
        run: |
          curl -fsSL --retry 3 -o source.zip \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.zip"

      - name: Download the attached binaries (whichever exist)
        run: |
          gh release download "$TAG" --pattern 'xenon-helper.exe' --dir . --clobber --repo "${{ github.repository }}" || echo "no helper attached"
          gh release download "$TAG" --pattern 'Xenon-Setup-x64.exe' --dir . --clobber --repo "${{ github.repository }}" || echo "no stable-named setup attached"

      - name: Hash and sign
        env:
          XENON_UPDATE_SIGNING_KEY: ${{ secrets.XENON_UPDATE_SIGNING_KEY }}
        run: |
          node -e '
            const crypto = require("crypto"), fs = require("fs");
            const pem = process.env.XENON_UPDATE_SIGNING_KEY;
            if (!pem || !pem.includes("PRIVATE KEY")) {
              console.error("FATAL: repo secret XENON_UPDATE_SIGNING_KEY is missing or not a PEM private key.");
              console.error("Self-update to this release would fail (integrity_missing). Add the secret and re-run.");
              process.exit(1);
            }
            const files = ["source.zip", "xenon-helper.exe", "Xenon-Setup-x64.exe"].filter((f) => fs.existsSync(f));
            let sums = "";
            for (const f of files) sums += crypto.createHash("sha256").update(fs.readFileSync(f)).digest("hex") + "  " + f + "\n";
            fs.writeFileSync("SHA256SUMS", sums);
            const key = crypto.createPrivateKey(pem);
            fs.writeFileSync("SHA256SUMS.sig", crypto.sign(null, Buffer.from(sums, "utf8"), key).toString("base64") + "\n");
            console.log("Signed:\n" + sums.trim());
          '

      - name: Attach to the release
        run: gh release upload "$TAG" SHA256SUMS SHA256SUMS.sig --clobber --repo "${{ github.repository }}"
