name: Announce release on Discord

# Posts a tidy embed to the community Discord #announcements channel every time a
# GitHub release is published — title, the release notes, and a link back to it.
#
# SETUP (one-time): add the channel webhook URL as a repository secret named
#   DISCORD_WEBHOOK_URL
# under Settings → Secrets and variables → Actions → New repository secret.
# Never hard-code the webhook here: anyone with that URL can post to the channel,
# so it must stay a secret. Without the secret the job just skips (safe for forks).
#
# The release body is passed through environment variables and assembled with jq
# (--arg), never interpolated into the shell — so a crafted release note can't
# inject commands, and multi-byte text/emoji round-trip correctly.

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: discord-announce-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for the release downloads to finish uploading
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # The helper, native-app and release-integrity workflows fire on the SAME
          # release:published event and take minutes to build and attach their
          # assets. Announcing immediately means someone who clicks through in that
          # window finds a release whose downloads aren't there yet (no installer, no
          # signed SHA256SUMS for self-update). So hold the announcement until every
          # expected asset is present. A generous timeout still lets the news go out
          # if a build is slow or fails — better late than suppressed forever; the
          # ::warning:: makes a timeout visible in the Actions log.
          need=( 'xenon-helper\.exe' '-setup\.exe$' '^latest\.json$' '^SHA256SUMS$' '^SHA256SUMS\.sig$' )
          deadline=$(( SECONDS + 900 ))   # 15 minutes
          while :; do
            names=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json assets --jq '.assets[].name' 2>/dev/null || true)
            missing=""
            for pat in "${need[@]}"; do
              printf '%s\n' "$names" | grep -Eq "$pat" || missing="$missing $pat"
            done
            if [ -z "$missing" ]; then
              echo "All expected assets are attached — announcing."
              break
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::warning::Timed out waiting for assets ($missing ); announcing anyway."
              break
            fi
            echo "Still waiting for:$missing"
            sleep 20
          done

      - name: Post release to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_TS: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set — skipping announcement."
            exit 0
          fi

          title="${RELEASE_NAME:-$RELEASE_TAG}"

          # Discord truncates any single embed at 4096 chars, so a long changelog
          # got cut off mid-sentence with a "…". Instead, split the release notes
          # into <=3900-char pieces on paragraph boundaries and post them as ordered
          # follow-up messages so nothing is lost. Chunking runs in node reading the
          # body from an env var (never the shell), and each chunk is escaped by
          # jq --arg — so a crafted release note still can't inject anything.
          chunks_json=$(RELEASE_BODY="${RELEASE_BODY:-}" node -e '
            const body = (process.env.RELEASE_BODY || "").trim();
            const MAX = 3900, MAX_PARTS = 8;
            const paras = body.split(/\n\n+/);
            const chunks = [];
            let cur = "";
            const flush = () => { if (cur) { chunks.push(cur); cur = ""; } };
            for (const p of paras) {
              if (p.length > MAX) {            // one huge paragraph: hard-split it
                flush();
                for (let i = 0; i < p.length; i += MAX) chunks.push(p.slice(i, i + MAX));
                continue;
              }
              const next = cur ? cur + "\n\n" + p : p;
              if (next.length > MAX) { flush(); cur = p; } else { cur = next; }
            }
            flush();
            if (chunks.length === 0) chunks.push("See the full release notes on GitHub.");
            if (chunks.length > MAX_PARTS) {   // pathological length: cap + point to GitHub
              chunks.length = MAX_PARTS;
              chunks[MAX_PARTS - 1] += "\n\n…read the rest on GitHub.";
            }
            process.stdout.write(JSON.stringify(chunks));
          ')

          # The message avatar + name come from the webhook's own settings in Discord
          # (set them there once) — no image URL here, so nothing can 404.
          n=$(jq 'length' <<<"$chunks_json")
          for i in $(seq 0 $((n - 1))); do
            chunk=$(jq -r ".[$i]" <<<"$chunks_json")
            first=$([ "$i" -eq 0 ] && echo true || echo false)
            last=$([ "$i" -eq "$((n - 1))" ] && echo true || echo false)
            suffix=""
            if [ "$n" -gt 1 ]; then suffix=" ($((i + 1))/$n)"; fi
            content=""
            if [ "$first" = true ]; then content="**🚀 ${title}** is out! 🎉"; fi

            payload=$(jq -n \
              --arg title   "🚀 ${title}${suffix}" \
              --arg url     "$RELEASE_URL" \
              --arg body    "$chunk" \
              --arg ts      "$RELEASE_TS" \
              --arg repo    "$REPO" \
              --arg content "$content" \
              --argjson first "$first" \
              --argjson last  "$last" \
              '{
                username: "Xenon",
                embeds: [
                  ( { title: ($title[0:250]), description: $body, color: 2023546 }
                    + (if $first then { url: $url } else {} end)
                    + (if $last  then { timestamp: $ts, footer: { text: ("New release · github.com/" + $repo) } } else {} end)
                  )
                ]
              }
              + (if $content != "" then { content: $content } else {} end)')

            curl -sS -f -H "Content-Type: application/json" \
              -X POST -d "$payload" "$DISCORD_WEBHOOK"
            # Space posts out to keep order and stay under the webhook rate limit.
            if [ "$last" != true ]; then sleep 1; fi
          done
          echo "Announced ${title} to Discord in ${n} message(s)."
