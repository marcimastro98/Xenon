<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xenon Search</title>
<!-- Spotlight popup (main PC): the local file search as its own window, opened
     by the global hotkey (helper hotkey-serve → server spawns Edge app-mode)
     or on demand. Same loopback server, same trust boundary; closing the
     Spotlight closes the window. The dashboard theme's accent/appearance are
     applied at boot from /settings so the pill matches the user's look. -->
<link rel="stylesheet" href="styles/global.css">
<link rel="stylesheet" href="components/Spotlight/Spotlight.css">
<style>
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
  /* The window IS the spotlight: theme background, pill centered, no
     backdrop-filter (there is nothing behind to frost). */
  body.spotlight-popup .spotlight {
    background: var(--bg, #0b0d11);
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
  }
  /* Pill pinned near the top so a compact (resized) window is JUST the pill,
     PowerToys-Run-style; results fill the grown window below it. */
  body.spotlight-popup .spot-shell { margin-top: 22px; }
  body.spotlight-popup .spot-expanded .spot-shell { margin-top: 22px; }
  body.spotlight-popup .spot-list { max-height: calc(100vh - 130px); }
  body.spotlight-popup .spotlight::before { display: none; }
  /* Native frameless window (?frameless=1): the window IS the pill,
     PowerToys-Run-style — sized exactly to the bar by the shell, filled
     edge-to-edge with the OPAQUE theme surface (Windows rounds the corners
     of undecorated windows on its own). Deliberately no transparency and no
     backdrop-filter: on hybrid-GPU machines the kiosk pins WebView2 to the
     iGPU while this window sits on the dGPU's monitor, and a transparent
     webview composed across adapters renders NOTHING (proven live). */
  html.spotlight-frameless-host,
  html.spotlight-frameless-host body { background: rgb(var(--panel-rgb)); }
  body.spotlight-frameless .spotlight { background: transparent; }
  body.spotlight-frameless .spot-shell {
    margin: 0;
    width: 100%;
    max-width: none;
    height: 100vh;
    border-radius: 0;
    border: none;
    box-shadow: none;
    background: rgb(var(--panel-rgb));
    -webkit-backdrop-filter: none;
    backdrop-filter: none;
  }
  body.spotlight-frameless .spot-shell {
    /* Hairline inside the window edge: gives the slab definition against any
       wallpaper without fighting the DWM corner rounding. */
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.09);
  }
  :root[data-theme="light"] body.spotlight-frameless .spot-shell {
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
  }
  body.spotlight-frameless .spot-bar { min-height: 62px; padding: 0 20px; }
  body.spotlight-frameless .spot-body { flex: 1; min-height: 0; padding: 0 8px 8px 12px; }
  body.spotlight-frameless .spot-expanded .spot-shell { margin: 0; width: 100%; }
  body.spotlight-frameless .spot-list { max-height: none; flex: 1; min-height: 0; }
  /* AI-mode ring: the shell here is square (the window IS the pill) but DWM
     rounds the window corners ~8px — give the ring the same radius so its
     corners are not clipped away by the rounding, and pull it 1px inside the
     edge: at fractional display scaling the window's outermost pixel column
     is partially clipped, which visibly thinned the ring's right side. */
  body.spotlight-frameless .spot-ai .spot-shell::after { border-radius: 8px; inset: 1px; }
</style>
</head>
<body class="spotlight-popup">
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/i18n.js"></script>
<script src="js/theme-palette.js"></script>
<script src="js/spotlight.js"></script>
<script>
  // Real theme parity: run the SAME palette engine the dashboard runs
  // (ThemePalette.derive + cssTokens) over the fetched settings, so the pill
  // here is pixel-for-pixel the dashboard's — accent, panel material, text,
  // light/dark halves, retro palette included.
  function applyPopupTheme(s) {
    try {
      var TP = window.ThemePalette;
      if (!TP) return;
      var tone = s.appearance === 'light' ? 'light'
        : s.appearance === 'dark' ? 'dark'
        : (window.matchMedia && matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      var source = Object.assign({}, s);
      // Dual-palette theme: overlay the half matching the tone (mirrors
      // buildThemeSource in settings.js, minus the album-accent live feed).
      source = TP.applyVariant(source, TP.variantFor(s.paletteVariants, tone));
      if (s.styleMode === 'retro') {
        Object.assign(source, {
          background: '#050510', surface: '#0d0e20', surfaceAlt: '#121328', controlColor: '#181a34',
          text: '#e8e8dc', mutedText: '#a9a9c0', lineColor: '#4c4c78', accent: '#f5c518',
        });
        tone = 'dark';
      }
      if (s.styleMode === 'comic' && !source.surface) source.surface = source.background;
      var palette = TP.derive(source, tone);
      var root = document.documentElement;
      var tokens = TP.cssTokens(palette);
      for (var k in tokens) root.style.setProperty(k, tokens[k]);
      // A color-scheme on the ROOT makes Chromium paint an OPAQUE canvas
      // backdrop under a transparent webview (white in light themes, black in
      // dark) — that WAS the "white bar": every CSS background was transparent
      // and the canvas showed instead. The frameless window must leave the
      // root scheme at 'normal'; the popup window is opaque and keeps it.
      if (!FRAMELESS) root.style.colorScheme = palette.tone;
      if (palette.tone === 'light') root.setAttribute('data-theme', 'light');
    } catch (e) { /* defaults from global.css are fine */ }
  }
  // Two hosts, one page. FRAMELESS = the native Tauri window (transparent, no
  // chrome): resize/close travel over the xenon-app: scheme the shell's
  // on_navigation hook intercepts. Otherwise: Edge app-mode fallback, where the
  // window shrinks to pill height at boot and grows only while results show
  // (resizeTo is normally honored for single-entry app windows; if refused,
  // everything still works at the spawned size).
  var FRAMELESS = /[?&]frameless=1/.test(location.search);
  if (FRAMELESS) {
    document.body.classList.add('spotlight-frameless');
    document.documentElement.classList.add('spotlight-frameless-host');
  }
  var COMPACT_H = 150, EXPANDED_H = 620, canResize = false;
  function tryCompact() {
    if (FRAMELESS) return;
    try {
      var before = window.outerHeight;
      window.resizeTo(window.outerWidth, COMPACT_H);
      setTimeout(function () {
        canResize = Math.abs(window.outerHeight - COMPACT_H) < 80;
        if (!canResize && window.outerHeight !== before) window.resizeTo(window.outerWidth, before);
      }, 100);
    } catch (e) { /* fixed size is fine */ }
  }
  window.addEventListener('spotlight-expand', function (ev) {
    var expanded = !!(ev.detail && ev.detail.expanded);
    if (FRAMELESS) {
      try { window.location.href = 'xenon-app:spotlight-' + (expanded ? 'expand' : 'collapse'); } catch (e) {}
      return;
    }
    if (!canResize) return;
    try { window.resizeTo(window.outerWidth, expanded ? EXPANDED_H : COMPACT_H); } catch (e) {}
  });
  window.addEventListener('DOMContentLoaded', function () {
    if (!window.Spotlight) return;
    Spotlight._setCloseNav(function () {
      if (FRAMELESS) {
        try { window.location.href = 'xenon-app:spotlight-close'; } catch (e) {}
        // The shell hides the window; reopen the pill so the NEXT show is live.
        setTimeout(function () { Spotlight.open(); }, 250);
        return;
      }
      window.close();
      // If the browser refused the script close (it normally allows it for
      // single-entry app windows), never strand a dead dark page: reopen.
      setTimeout(function () { if (!document.hidden) Spotlight.open(); }, 150);
    });
    tryCompact();
    fetch('/settings').then(function (r) { return r.json(); })
      .then(function (s) { if (s) applyPopupTheme(s); })
      .catch(function () { /* defaults */ })
      .finally(function () { Spotlight.open(); });
  });
</script>
</body>
</html>
